1,"text":"if they are the subject of the complaint. Q: Is remote work available for clinical roles? A: Direct patient care roles are not eligible for remote work; select administrative, coding, and telehealth-support roles may be "},{"x":0.32653,"y":0.22518,"doc":"New_Employee_Orientation_Guide","file":"New_Employee_Orientation_Guide.docx","type":"word","idx":0,"text":"New Employee Orientation Guide Sunrise Medical Center Document Title: New Employee Orientation Guide Document ID: SMC-HR-005 Department: Human Resources / Learning and Development Effective Date: March 1, 2021 Last Revis"},{"x":0.18633,"y":-0.13033,"doc":"New_Employee_Orientation_Guide","file":"New_Employee_Orientation_Guide.docx","type":"word","idx":1,"text":"Day One Agenda 3. Day Two Agenda 4. Hospital-Wide Codes Quick Reference Every new employee must memorize the hospital's overhead emergency codes before completing orientation, as these are used hospital-wide and staff ar"},{"x":0.09782,"y":-0.07309,"doc":"New_Employee_Orientation_Guide","file":"New_Employee_Orientation_Guide.docx","type":"word","idx":2,"text":"Badge access to clinical units, medication rooms, and restricted areas is granted only after the employee's manager confirms required training has been completed, which may occur after orientation for some restricted are"},{"x":0.14041,"y":-0.08812,"doc":"New_Employee_Orientation_Guide","file":"New_Employee_Orientation_Guide.docx","type":"word","idx":3,"text":"Required Post-Orientation Competencies Following NEO, employees proceed to department-specific onboarding, which includes hands-on competency validation for role-specific equipment and procedures, shadowing shifts with a"},{"x":0.14537,"y":-0.05272,"doc":"New_Employee_Orientation_Guide","file":"New_Employee_Orientation_Guide.docx","type":"word","idx":4,"text":"training. Q: When do I get my parking permit? A: Parking permits are issued by Facilities during the Day Two building tour, tied to your assigned badge. Q: Is orientation paid time? A: Yes, orientation is treated as regu"},{"x":0.1308,"y":-0.08705,"doc":"New_Employee_Orientation_Guide","file":"New_Employee_Orientation_Guide.docx","type":"word","idx":5,"text":"Walkthrough | HR Benefits Team Time | Topic | Presenter 8:00 - 9:00 AM | Electronic Health Record System Basics | IT Training Team 9:00 - 10:00 AM | Medication Safety Fundamentals | Pharmacy 10:15 - 11:15 AM | Cultural C"},{"x":0.39375,"y":0.35923,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":0,"text":"============================================================================== SUNRISE MEDICAL CENTER NURSING SHIFT HANDOVER (SBAR) CHECKLIST =============================================================================="},{"x":0.11506,"y":-0.10085,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":1,"text":"WHY SBAR HANDOVER ----------------- Missed or vague handoffs are one of the top causes of preventable adverse events. Use SBAR (Situation, Background, Assessment, Recommendation) for every patient, every handoff, no shor"},{"x":0.10417,"y":-0.12237,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":2,"text":"A - ASSESSMENT --------------   * Current vital signs and trend (improving/worsening/stable)   * Pain level and last pain medication time   * Lines, tubes, drains - type, location, day of insertion   * Mental status / fa"},{"x":0.13866,"y":-0.17786,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":3,"text":"BEDSIDE HANDOFF CHECKLIST (walk into the room together) -------------------------------------------------------   1. Introduce incoming nurse to patient by name   2. Visually verify IV site, dressing, and drain status to"},{"x":0.09153,"y":-0.09742,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":4,"text":"END OF CHECKLIST NOTE --------------------- If something feels unclear or incomplete during handoff, stop and ask - don't accept the patient's care until you're confident in the picture you've been given. It is always ac"},{"x":0.17384,"y":-0.17797,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":5,"text":"FREQUENTLY ASKED QUESTIONS --------------------------   * Q: What if the outgoing nurse is in a hurry and wants to skip bedside handoff? A: Bedside handoff is not optional per unit policy; ask the charge nurse to help fa"},{"x":0.08318,"y":-0.08528,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":6,"text":"NEW GRADUATE NOTE ----------------- It's normal to feel like handoff takes longer when you're new - use the full SBAR structure every time until it becomes automatic rather than trying to shortcut it to save time. Precep"},{"x":0.07728,"y":-0.10865,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":7,"text":"WORKED EXAMPLE - FULL SBAR AT BEDSIDE ------------------------------------- Outgoing RN: 'This is Mrs. Alvarez in 308, full code, admitted for pneumonia. She's been stable overnight, on 2 liters nasal cannula, sats 94-96"},{"x":0.088,"y":-0.12784,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":8,"text":"Incoming RN: 'Got it - full code, pneumonia, stable overnight, 2L NC, IV day 2 looks good, fall risk with bed alarm, X-ray pending, possible discharge tomorrow. Let me go verify the IV site and pump settings with you bef"},{"x":0.12653,"y":-0.13277,"doc":"Shift_Handover_Checklist","file":"Shift_Handover_Checklist.txt","type":"text","idx":9,"text":"CHARGE NURSE SPOT-CHECK EXPECTATIONS ------------------------------------ Charge nurses periodically observe bedside handoffs, particularly for new graduate nurses and float/agency staff, to confirm all SBAR elements and"},{"x":0.37737,"y":0.24183,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":0,"text":"Code Blue \u2014 Adult Cardiac Arrest Response Protocol Sunrise Medical Center Document Title: Code Blue \u2014 Adult Cardiac Arrest Response Protocol Document ID: SMC-ED-021 Department: Emergency Department / Critical Care Effect"},{"x":0.05525,"y":-0.05396,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":1,"text":"Consistency across units reduces the cognitive load on responders during a high-stress event and improves return-of-spontaneous-circulation (ROSC) rates. This protocol is based on the current American Heart Association A"},{"x":0.15194,"y":-0.18998,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":2,"text":"Activation Any staff member who discovers an unresponsive patient without a pulse or normal breathing must immediately call a Code Blue by pressing the nearest code button or dialing extension 5555 and stating the exact "},{"x":0.22217,"y":-0.09115,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":3,"text":"Code Team Composition The Sunrise Medical Center Code Blue team consists of the on-call Hospitalist or Intensivist (team leader), an ICU or ED nurse (medication nurse), a Respiratory Therapist (airway management), a seco"},{"x":0.08628,"y":-0.11132,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":4,"text":"and airway management concurrent with compressions rather than sequentially. \u25cf Compressor rotation occurs every 2 minutes (or sooner if fatigue is evident) to maintain compression quality. \u25cf Rhythm checks occur every 2 m"},{"x":0.15478,"y":-0.1103,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":5,"text":"Post-Resuscitation Care Patients achieving ROSC are transferred to the Intensive Care Unit for targeted temperature management evaluation, continuous cardiac monitoring, and 12-lead ECG to assess for STEMI requiring emer"},{"x":0.13581,"y":-0.15383,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":6,"text":"Documentation The code recorder documents all interventions, medication times and doses, rhythm checks, and team members present on the standardized Code Blue Record. This form is scanned into the patient's chart within "},{"x":0.12088,"y":-0.13399,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":7,"text":"Equipment and Crash Cart Standards Item Check Frequency Responsible Party Defibrillator/AED function test Daily Unit Charge Nurse Crash cart seal/lock verification Daily Unit Charge Nurse Medication expiration audit Mont"},{"x":0.18058,"y":-0.10827,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":8,"text":"SMC-CC-004 Post-Cardiac Arrest Targeted Temperature Management Policy; SMC-PT-007 Family Presence During Resuscitation Policy; SMC-PHARM-011 Code Cart Medication Standards; SMC-RT-002 Airway Management Equipment Manual. "},{"x":0.13819,"y":-0.16375,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":9,"text":"How is a DNR/DNI status confirmed during an active code? A: Compressions continue until a valid, chart-confirmed DNR/DNI order is verified by the team leader; verbal family reports alone, without chart documentation, are"},{"x":0.11942,"y":-0.11657,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":10,"text":"arrest: Manual left uterine displacement is added to standard compressions, and Obstetrics is paged immediately given the possibility of emergent perimortem cesarean delivery if ROSC is not achieved within 4 minutes. Sce"},{"x":0.10996,"y":-0.10916,"doc":"Cardiac_Arrest_Code_Blue_Protocol","file":"Cardiac_Arrest_Code_Blue_Protocol.pdf","type":"pdf","idx":11,"text":"Revision History Version Date Description 1.0 Jun 1, 2021 Initial release 1.2 Aug 20, 2023 Updated compressor rotation interval 1.3 Jan 8, 2026 Added post-arrest STEMI catheterization pathway"},{"x":0.43372,"y":0.39234,"doc":"Fire_Evacuation_Quick_Guide","file":"Fire_Evacuation_Quick_Guide.txt","type":"text","idx":0,"text":"============================================================================== SUNRISE MEDICAL CENTER FIRE SAFETY AND EVACUATION QUICK GUIDE ============================================================================== "},{"x":0.08237,"y":-0.12701,"doc":"Fire_Evacuation_Quick_Guide","file":"Fire_Evacuation_Quick_Guide.txt","type":"text","idx":1,"text":"REMEMBER: R.A.C.E. ------------------   * R - RESCUE anyone in immediate danger from the fire/smoke   * A - ALARM: pull the nearest fire alarm pull station AND call Code Red (ext 0, ask operator to announce Code Red + lo"},{"x":0.10632,"y":-0.12792,"doc":"Fire_Evacuation_Quick_Guide","file":"Fire_Evacuation_Quick_Guide.txt","type":"text","idx":2,"text":"IN PATIENT CARE AREAS - EVACUATION PRIORITY ------------------------------------------- Hospitals use HORIZONTAL evacuation first (move patients through smoke doors to the adjacent fire compartment on the SAME floor) rat"},{"x":0.1318,"y":-0.14772,"doc":"Fire_Evacuation_Quick_Guide","file":"Fire_Evacuation_Quick_Guide.txt","type":"text","idx":3,"text":"* Ambulatory patients: walk them to the safe zone beyond the nearest smoke door   * Wheelchair/non-ambulatory patients: use the unit's evacuation chairs (stored near the stairwell, labeled)   * Bed-bound patients: move t"},{"x":0.09497,"y":-0.11996,"doc":"Fire_Evacuation_Quick_Guide","file":"Fire_Evacuation_Quick_Guide.txt","type":"text","idx":4,"text":"IF YOU DISCOVER A FIRE ----------------------   1. Rescue anyone in immediate danger   2. Pull the nearest alarm pull station   3. Call ext 0 an const palette = ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd", "#8c564b", "#e377c2", "#7f7f7f", "#bcbd22", "#17becf", "#aec7e8", "#ffbb78", "#98df8a", "#ff9896", "#c5b0d5", "#c49c94", "#f7b6d2", "#c7c7c7", "#dbdb8d", "#9edae5"];
const docs = [...new Set(points.map(p => p.doc))];
const colorOf = {};
docs.forEach((d, i) => colorOf[d] = palette[i % palette.length]);

function makeDatasets(list) {
  return docs.filter(d => list.some(p => p.doc === d)).map(d => ({
    label: d,
    data: list.filter(p => p.doc === d),
    backgroundColor: colorOf[d],
    pointRadius: 5,
    pointHoverRadius: 8
  }));
}

const detailEl = document.getElementById('detail');
function showDetail(raw) {
  detailEl.innerHTML =
    '<b>' + raw.file + '</b> &middot; chunk ' + raw.idx + '<br><br>' + raw.text + '&hellip;';
}

const tooltipCb = { callbacks: { label: (ctx) => ctx.raw.file + ' (chunk ' + ctx.raw.idx + ')' } };
function onPointClick(evt, elements, chart) {
  if (!elements.length) return;
  const el = elements[0];
  const raw = chart.data.datasets[el.datasetIndex].data[el.index];
  showDetail(raw);
}

new Chart(document.getElementById('chartAll'), {
  type: 'scatter',
  data: { datasets: makeDatasets(points) },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    onClick: onPointClick,
    plugins: { legend: { display: false }, tooltip: tooltipCb },
    scales: {
      x: { title: { display: true, text: 'dimension 1 (arbitrary units)' } },
      y: { title: { display: true, text: 'dimension 2 (arbitrary units)' } }
    }
  }
});

const nonCode = points.filter(p => p.type !== 'code');
new Chart(document.getElementById('chartNoCode'), {
  type: 'scatter',
  data: { datasets: makeDatasets(nonCode) },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    onClick: onPointClick,
    plugins: { legend: { display: false }, tooltip: tooltipCb },
    scales: {
      x: { title: { display: true, text: 'dimension 1 (arbitrary units)' } },
      y: { title: { display: true, text: 'dimension 2 (arbitrary units)' } }
    }
  }
});

const legend = document.getElementById('legend');
docs.forEach(d => {
  const item = document.createElement('span');
  item.className = 'item';
  const swatch = document.createElement('span');
  swatch.className = 'swatch';
  swatch.style.background = colorOf[d];
  item.appendChild(swatch);
  item.appendChild(document.createTextNode(d.replace(/^doc\d+_/, '')));
  legend.appendChild(item);
});
</script>
